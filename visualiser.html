<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRISM — Structure Map</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#0a0e27; --surface:#1a1f3a; --surface2:#222844;
      --border:#2a3051; --text:#e8eaf6; --dim:#8b8fa8;
      --green:#22c55e; --red:#ef4444; --amber:#fbbf24; --blue:#3b82f6;
      --purple:#a855f7; --gold:#fbbf24; --silver:#94a3b8;
      --orange:#f97316; --cyan:#06b6d4; --lime:#84cc16;
    }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }
    .app { display:flex; height:100vh; }

    .sidebar {
      width:320px; min-width:320px; background:var(--surface);
      border-right:1px solid var(--border); display:flex; flex-direction:column;
      overflow-y:auto; transition:transform .3s; position:relative; z-index:50;
    }
    .sidebar.hidden { transform:translateX(-100%); }
    .sb-toggle {
      position:absolute; right:-40px; top:50%; transform:translateY(-50%);
      width:40px; height:100px; background:var(--surface); border:1px solid var(--border);
      border-left:none; border-radius:0 10px 10px 0; display:flex; align-items:center;
      justify-content:center; cursor:pointer; font-size:1.2rem; z-index:51;
    }
    .sb-header { padding:1.25rem; border-bottom:1px solid var(--border); }
    .sb-title { font-size:1.1rem; font-weight:800; margin-bottom:.25rem; }
    .sb-sub { font-size:.7rem; color:var(--dim); }
    .status-badge { margin-top:.75rem; padding:.6rem .75rem; border-radius:8px; font-size:.75rem; font-weight:700; display:none; }
    .status-badge.out { background:rgba(239,68,68,.15); border:1px solid var(--red); color:var(--red); display:block; }
    .status-badge.ok { background:rgba(34,197,94,.15); border:1px solid var(--green); color:var(--green); display:block; }

    .section { padding:1rem 1.25rem; border-bottom:1px solid var(--border); }
    .sec-title { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--dim); margin-bottom:.75rem; }

    .btn { width:100%; padding:.6rem; background:linear-gradient(135deg,var(--blue),#2563eb); border:none; color:#fff; border-radius:7px; font-weight:600; cursor:pointer; margin-bottom:.4rem; font-size:.8rem; transition:all .2s; }
    .btn:hover { transform:translateY(-1px); }
    .btn.sec { background:var(--bg); border:1px solid var(--border); color:var(--dim); }
    .btn.sec:hover { color:var(--text); }

    .stat-row { display:flex; justify-content:space-between; align-items:center; padding:.5rem .6rem; background:var(--bg); border-radius:6px; margin-bottom:.35rem; font-size:.8rem; }
    .stat-val { font-weight:700; }
    .stat-val.ok { color:var(--green); }
    .stat-val.bad { color:var(--red); }

    .tabs { display:flex; border-bottom:1px solid var(--border); }
    .tab { flex:1; padding:.6rem; text-align:center; font-size:.7rem; font-weight:700; cursor:pointer; color:var(--dim); border-bottom:2px solid transparent; transition:all .2s; }
    .tab.active { color:var(--blue); border-bottom-color:var(--blue); }

    .panel { display:none; padding:.75rem 1.25rem; }
    .panel.active { display:block; }

    .change-item { display:flex; justify-content:space-between; align-items:center; padding:.4rem .5rem; border-radius:5px; margin-bottom:.3rem; font-size:.75rem; cursor:pointer; }
    .change-item:hover { background:var(--bg); }

    .option-card { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:.75rem; margin-bottom:.6rem; font-size:.75rem; }
    .option-card.viable { border-color:var(--green); }
    .option-card.possible { border-color:var(--amber); }
    .option-card.hard { border-color:var(--red); }
    .option-title { font-weight:700; margin-bottom:.4rem; }
    .option-row { display:flex; justify-content:space-between; margin-bottom:.2rem; color:var(--dim); }
    .option-row span:last-child { color:var(--text); }

    .search-input { width:100%; padding:.5rem .6rem; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px; font-size:.8rem; margin-bottom:.5rem; }
    .search-input:focus { outline:none; border-color:var(--blue); }
    .search-result { padding:.4rem .5rem; border-radius:5px; cursor:pointer; font-size:.75rem; margin-bottom:.2rem; }
    .search-result:hover { background:var(--bg); }

    select { width:100%; padding:.5rem; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px; font-size:.8rem; margin-bottom:.5rem; }

    .canvas-wrap { flex:1; position:relative; overflow:hidden; }
    canvas { cursor:grab; display:block; }
    canvas:active { cursor:grabbing; }

    .breadcrumb { position:absolute; top:1rem; left:1rem; background:var(--surface); padding:.5rem 1rem; border-radius:8px; border:1px solid var(--border); font-size:.8rem; display:flex; align-items:center; gap:.4rem; z-index:10; max-width:60%; flex-wrap:wrap; }
    .bc-item { color:var(--dim); cursor:pointer; }
    .bc-item:hover { color:var(--text); }
    .bc-item.active { color:var(--text); font-weight:700; }

    .date-badge { position:absolute; top:1rem; right:1rem; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:.5rem .75rem; font-size:.75rem; z-index:10; }

    .controls { position:absolute; bottom:1.5rem; right:1.5rem; display:flex; flex-direction:column; gap:.4rem; }
    .ctrl-btn { width:40px; height:40px; background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:8px; cursor:pointer; font-size:1.2rem; display:flex; align-items:center; justify-content:center; }
    .ctrl-btn:hover { border-color:var(--blue); color:var(--blue); }

    .tooltip { position:absolute; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem; pointer-events:none; opacity:0; transition:opacity .15s; z-index:100; min-width:200px; max-width:260px; }
    .tooltip.show { opacity:1; }
    .tt-name { font-weight:700; margin-bottom:.15rem; font-size:.9rem; }
    .tt-level { font-size:.7rem; color:var(--dim); margin-bottom:.6rem; }
    .tt-badge { display:inline-block; padding:.2rem .5rem; border-radius:4px; font-size:.72rem; font-weight:700; margin-bottom:.6rem; }
    .tt-pigs { display:grid; grid-template-columns:repeat(4,1fr); gap:.4rem; }
    .tt-pig { text-align:center; }
    .tt-pig-val { font-size:1.1rem; font-weight:800; }
    .tt-pig-lbl { font-size:.6rem; color:var(--dim); text-transform:uppercase; }

    .empty-state { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:2rem; }
    .empty-icon { font-size:4rem; margin-bottom:1rem; }
    .empty-title { font-size:1.5rem; font-weight:700; margin-bottom:.5rem; }
    .empty-sub { color:var(--dim); font-size:.875rem; margin-bottom:1.5rem; max-width:400px; }

    .config-bar { background:var(--surface2); border-bottom:1px solid var(--border); padding:.75rem 1.25rem; display:flex; gap:.5rem; align-items:center; font-size:.8rem; }
    .config-bar input { flex:1; padding:.4rem .6rem; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px; font-size:.75rem; }
    .config-bar input:focus { outline:none; border-color:var(--blue); }
    .config-bar button { padding:.4rem .8rem; background:var(--blue); border:none; color:#fff; border-radius:6px; cursor:pointer; font-size:.75rem; font-weight:600; white-space:nowrap; }
    .config-bar label { color:var(--dim); white-space:nowrap; font-size:.75rem; }

    @media (max-width:768px) {
      .sidebar { position:absolute; height:100vh; z-index:100; box-shadow:4px 0 12px rgba(0,0,0,.3); transform:translateX(-100%); }
      .sidebar.visible { transform:translateX(0); }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sb-toggle" onclick="toggleSidebar()" id="sbToggle">◀</div>
    <div class="sb-header">
      <div class="sb-title">🔷 PRISM</div>
      <div class="sb-sub" id="viewingLabel">No data loaded</div>
      <div class="status-badge" id="statusBadge"></div>
    </div>
    <div class="config-bar">
      <label>Sheet URL</label>
      <input type="url" id="sheetUrl" placeholder="Apps Script URL" oninput="saveUrl()">
      <button onclick="loadFromSheet()">Load</button>
    </div>
    <div class="section">
      <button class="btn sec" onclick="goBack()">↩ Back</button>
      <button class="btn sec" onclick="goHome()">🏠 My Structure</button>
      <button class="btn sec" onclick="loadFromSheet()">🔄 Refresh</button>
    </div>
    <div class="section">
      <div class="sec-title">SGL Progress</div>
      <div id="statsContainer"></div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('changes')" id="tab-changes">Changes</div>
      <div class="tab" onclick="switchTab('status')" id="tab-status">Status Fix</div>
      <div class="tab" onclick="switchTab('search')" id="tab-search">Search</div>
    </div>
    <div class="panel active" id="panel-changes">
      <div style="margin-bottom:.75rem;display:flex;gap:.4rem;align-items:center;">
        <select id="dateSelect1" onchange="applyComparison()" style="flex:1;margin:0;"></select>
        <span style="color:var(--dim);font-size:.7rem;">vs</span>
        <select id="dateSelect2" onchange="applyComparison()" style="flex:1;margin:0;"></select>
      </div>
      <div id="changesList" style="font-size:.75rem;max-height:calc(100vh - 420px);overflow-y:auto;"></div>
    </div>
    <div class="panel" id="panel-status">
      <div id="statusPanel" style="max-height:calc(100vh - 360px);overflow-y:auto;"></div>
    </div>
    <div class="panel" id="panel-search">
      <input class="search-input" type="text" placeholder="Search partner..." oninput="searchPartners(this.value)">
      <div id="searchResults" style="max-height:calc(100vh - 380px);overflow-y:auto;"></div>
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="canvas"></canvas>
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="date-badge" id="dateBadge" style="display:none"></div>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🔷</div>
      <div class="empty-title">PRISM</div>
      <div class="empty-sub">Paste your Apps Script URL in the sidebar and click Load to pull your structure data from Google Sheets.</div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="doZoom(1.2)">+</button>
      <button class="ctrl-btn" onclick="doZoom(0.83)">−</button>
      <button class="ctrl-btn" onclick="resetView()">⟲</button>
    </div>
    <div class="tooltip" id="tooltip"></div>
  </div>
</div>

<script>
const COLORS={NNL:'#a855f7',NGL:'#fbbf24',SGL:'#94a3b8',GL:'#ef4444',STL:'#3b82f6',TL:'#22c55e',FTL:'#f97316',SQD:'#84cc16',QDS:'#06b6d4',QD:'#7c3aed',D:'#c084fc'};
let allDates={},currentData=null,compareData=null,viewStack=[];
let scale=1,ox=0,oy=0,isDrag=false,dx=0,dy=0;
let nodes=[],lines=[],hoveredNode=null;
let canvas,ctx;

window.addEventListener('load',()=>{
  canvas=document.getElementById('canvas');
  ctx=canvas.getContext('2d');
  resize(); window.addEventListener('resize',resize);
  canvas.addEventListener('mousedown',mdown);
  canvas.addEventListener('mousemove',mmove);
  canvas.addEventListener('mouseup',()=>isDrag=false);
  canvas.addEventListener('mouseleave',()=>{isDrag=false;hoveredNode=null;hideTT();draw();});
  canvas.addEventListener('wheel',mwheel,{passive:false});
  canvas.addEventListener('dblclick',mdbl);
  const url=localStorage.getItem('prism_sheet_url');
  if(url){document.getElementById('sheetUrl').value=url;loadFromSheet();}
});

function resize(){const w=document.getElementById('canvasWrap');canvas.width=w.clientWidth;canvas.height=w.clientHeight;draw();}

function saveUrl(){const u=document.getElementById('sheetUrl').value.trim();if(u)localStorage.setItem('prism_sheet_url',u);}

async function loadFromSheet(){
  const url=document.getElementById('sheetUrl').value.trim();
  if(!url){alert('Please enter your Apps Script URL.');return;}
  saveUrl();
  document.getElementById('viewingLabel').textContent='⏳ Loading...';
  try{
    // Try ?all=1 first
    const r=await fetch(url+'?all=1');
    const j=await r.json();
    if(j.ok&&j.data&&j.data.length){
      allDates={};
      j.data.forEach(row=>{
        const d=row.date;
        if(!d)return;
        if(!allDates[d])allDates[d]=[];
        allDates[d].push({level:parseInt(row.partner_level)||1,name:row.partner_name||'',title:row.title||'D',closed:row.closed==='TRUE'||row.closed===true,pc:parseInt(row.personal_customers)||0,uwId:parseInt(row.partner_ids)||0,gc:parseInt(row.group_customers)||0,services:parseInt(row.group_services)||0});
      });
      const dates=Object.keys(allDates).sort().reverse();
      populateDates(dates);
      useLatest();
      document.getElementById('emptyState').style.display='none';
    } else {
      // Fallback — dates only
      const r2=await fetch(url);
      const j2=await r2.json();
      if(j2.ok&&j2.dates){
        populateDates(j2.dates);
        document.getElementById('viewingLabel').textContent='⚠️ Update your Apps Script to see structure data. Dates loaded: '+j2.dates.length;
      }
    }
  }catch(e){document.getElementById('viewingLabel').textContent='❌ Load failed — check URL';console.error(e);}
}

function populateDates(dates){
  const s1=document.getElementById('dateSelect1');
  const s2=document.getElementById('dateSelect2');
  s1.innerHTML=dates.map((d,i)=>`<option value="${d}">${d}${i===0?' (latest)':''}</option>`).join('');
  s2.innerHTML='<option value="">vs: none</option>'+dates.slice(1).map(d=>`<option value="${d}">${d}</option>`).join('');
}

function useLatest(){
  const dates=Object.keys(allDates).sort().reverse();
  if(!dates.length)return;
  currentData={date:dates[0],partners:allDates[dates[0]]};
  viewStack=[currentData.partners[0]];
  render();
}

function applyComparison(){
  const d1=document.getElementById('dateSelect1').value;
  const d2=document.getElementById('dateSelect2').value;
  if(d1&&allDates[d1]){
    currentData={date:d1,partners:allDates[d1]};
    const name=viewStack.length?viewStack[viewStack.length-1].name:null;
    const found=name?currentData.partners.find(p=>p.name===name):null;
    viewStack=[found||currentData.partners[0]];
  }
  compareData=d2&&allDates[d2]?{date:d2,partners:allDates[d2]}:null;
  render();
}

function render(){
  if(!currentData||!viewStack.length)return;
  const root=currentData.partners.find(p=>p.name===viewStack[viewStack.length-1].name)||viewStack[viewStack.length-1];
  document.getElementById('viewingLabel').textContent=dname(root)+' — '+currentData.date;
  document.getElementById('dateBadge').textContent=currentData.date;
  document.getElementById('dateBadge').style.display='block';
  const badge=document.getElementById('statusBadge');
  if(isOOS(root)){badge.className='status-badge out';badge.textContent='⚠️ Out of Status: '+titleOnly(root)+' → '+statusOnly(root);}
  else{badge.className='status-badge ok';badge.textContent='✅ In Status: '+root.title;}
  updateStats();updateBC();layout(root);draw();buildChanges();buildStatus();
}

function updateStats(){
  const you=currentData.partners[0];
  const active=currentData.partners.filter(p=>!p.closed&&p.level>1);
  const stl=active.filter(p=>p.level===2&&p.title.toUpperCase().includes('STL')).length;
  const tl=active.filter(p=>p.level===2&&p.title.toUpperCase().includes('TL')&&!p.title.toUpperCase().includes('STL')).length;
  const gl=active.filter(p=>p.level===2&&p.title.toUpperCase().includes('GL')).length;
  const rows=[{l:'PC',c:you.pc,r:25},{l:'GC',c:you.gc,r:2000},{l:'STL',c:stl,r:2},{l:'TL',c:tl,r:3},{l:'GL',c:gl,r:1}];
  document.getElementById('statsContainer').innerHTML=rows.map(r=>`<div class="stat-row"><span style="color:var(--dim)">${r.l}</span><span class="stat-val ${r.c>=r.r?'ok':'bad'}">${r.c}/${r.r}</span></div>`).join('');
}

function updateBC(){
  const root=currentData.partners[0];
  const cur=viewStack[viewStack.length-1];
  const path=[root];
  if(cur.name!==root.name){
    const ci=currentData.partners.findIndex(p=>p.name===cur.name);
    let lv=cur.level-1;
    for(let i=ci-1;i>=0&&lv>1;i--){
      if(currentData.partners[i].level===lv){path.push(currentData.partners[i]);lv--;}
    }
    path.push(cur);
  }
  document.getElementById('breadcrumb').innerHTML=path.map((p,i)=>{
    const last=i===path.length-1;
    return `<span class="bc-item${last?' active':''}" onclick="navTo('${p.name}')">${sname(p)}</span>`;
  }).join('<span style="color:var(--dim)">›</span>');
}

function layout(root){
  nodes=[];lines=[];
  const ri=currentData.partners.indexOf(root);
  const cx=canvas.width/2,cy=canvas.height/2;
  nodes.push({...root,x:cx,y:cy,r:60,isRoot:true,idx:ri});
  const all=[];
  for(let i=ri+1;i<currentData.partners.length;i++){
    const p=currentData.partners[i];
    if(p.level<=root.level)break;
    all.push({...p,idx:i});
  }
  const gpar=p=>{for(let i=p.idx-1;i>=ri;i--){if(currentData.partners[i].level===p.level-1)return i===ri?root:(all.find(d=>d.idx===i)||root);}return root;};
  const gkids=parent=>{const pi=parent.idx!==undefined?parent.idx:ri;return all.filter(p=>{const par=gpar(p);return(par.idx!==undefined?par.idx:ri)===pi;});};
  const cdes=p=>{let c=0;for(let i=(p.idx||ri)+1;i<currentData.partners.length;i++){if(currentData.partners[i].level<=p.level)break;c++;}return c;};
  const place=(parent,px,py,mid,depth,span)=>{
    const kids=gkids(parent);
    if(!kids.length)return;
    const sizes=kids.map(k=>Math.max(1,cdes(k)));
    const tot=sizes.reduce((a,b)=>a+b,0);
    const br=depth===1?180:depth===2?120:depth===3?90:75;
    let ang=mid-span/2;
    kids.forEach((k,i)=>{
      const ks=(sizes[i]/tot)*span;
      const angle=ang+ks/2;
      const minA=110/br;
      const r=minA>ks?Math.min((minA/ks)*br,br*2.5):br;
      const x=px+Math.cos(angle)*r,y=py+Math.sin(angle)*r;
      const sz=k.title.toUpperCase().includes('TL')||k.title.toUpperCase().includes('GL')?56:k.pc>=10?50:44;
      nodes.push({...k,x,y,r:sz});
      lines.push({x1:px,y1:py,x2:x,y2:y});
      place(k,x,y,angle,depth+1,ks);
      ang+=ks;
    });
  };
  place(root,cx,cy,-Math.PI/2,1,Math.PI*2);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!nodes.length)return;
  ctx.save();ctx.translate(ox,oy);ctx.scale(scale,scale);
  ctx.strokeStyle='rgba(139,143,168,.2)';ctx.lineWidth=1.5;
  lines.forEach(l=>{ctx.beginPath();ctx.moveTo(l.x1,l.y1);ctx.lineTo(l.x2,l.y2);ctx.stroke();});
  if(compareData){nodes.forEach(n=>{const g=grw(n);if(!g)return;const c=g.isNew?[34,197,94]:g.newlyClosed?[239,68,68]:g.isHot?[239,68,68]:g.isCold?[59,130,246]:null;if(!c)return;for(let i=5;i>0;i--){ctx.beginPath();ctx.arc(n.x,n.y,n.r+i*9,0,Math.PI*2);ctx.fillStyle=`rgba(${c},${0.08*i/5})`;ctx.fill();}});}
  nodes.forEach(n=>{
    const col=ncol(n);
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
    if(n.isRoot){ctx.strokeStyle='#00d9ff';ctx.lineWidth=4;ctx.stroke();}
    if(n.closed){ctx.strokeStyle='#94a3b8';ctx.lineWidth=2.5;ctx.stroke();}
    if(isOOS(n)){ctx.strokeStyle='#ef4444';ctx.lineWidth=3.5;ctx.stroke();ctx.save();ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.clip();ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=2;for(let i=-n.r*2;i<n.r*2;i+=9){ctx.beginPath();ctx.moveTo(n.x+i-n.r,n.y-n.r);ctx.lineTo(n.x+i+n.r,n.y+n.r);ctx.stroke();}ctx.restore();}
    if(n===hoveredNode){ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.stroke();}
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
    const nm=n.isRoot?dname(n):sname(n);
    ctx.font=`700 ${n.r>50?13:11}px Inter`;ctx.fillText(nm,n.x,n.y-9);
    const ids=cads(n);
    ctx.font='600 9px Inter';ctx.fillText(`${n.pc}  ${ids}  ${n.gc}`,n.x,n.y+5);
    if(compareData){
      const g=grw(n);
      if(g){
        const ix=n.x+n.r+14;
        if(g.isNew){ctx.font='14px Inter';ctx.fillText('🔥',ix,n.y);ctx.font='8px Inter';ctx.fillStyle='#22c55e';ctx.fillText('NEW',ix+14,n.y);ctx.fillStyle='#fff';}
        else if(g.newlyClosed){ctx.font='14px Inter';ctx.fillText('🚨',ix,n.y);}
        else if(g.isHot){ctx.font='14px Inter';ctx.fillText('🔥',ix,n.y);}
        else if(g.isCold){ctx.font='14px Inter';ctx.fillText('❄️',ix,n.y);}
        else if(g.pd>0||g.gd>0){ctx.font='11px Inter';ctx.fillStyle='#22c55e';ctx.fillText('↗',ix,n.y);ctx.fillStyle='#fff';}
        else if(g.pd<0||g.gd<0){ctx.font='11px Inter';ctx.fillStyle='#ef4444';ctx.fillText('↘',ix,n.y);ctx.fillStyle='#fff';}
      }
    }
  });
  ctx.restore();
}

function cads(p){const pi=currentData.partners.findIndex(x=>x.name===p.name);let c=0;for(let i=pi+1;i<currentData.partners.length;i++){const q=currentData.partners[i];if(q.level<=p.level)break;if(!q.closed)c++;}return c;}

function ncol(p){
  if(p.closed)return'#111';
  const s=statusOnly(p).toUpperCase();
  if(s.includes('NNL'))return COLORS.NNL;if(s.includes('NGL'))return COLORS.NGL;
  if(s.includes('SGL'))return COLORS.SGL;if(s.includes('GL'))return COLORS.GL;
  if(s.includes('STL'))return COLORS.STL;if(s.includes('TL'))return COLORS.TL;
  const pi=currentData.partners.findIndex(x=>x.name===p.name);
  let qd=0,d=0;
  for(let i=pi+1;i<currentData.partners.length;i++){const c=currentData.partners[i];if(c.level<=p.level)break;if(c.level===p.level+1&&!c.closed){if(c.pc>=3)qd++;else d++;}}
  if(p.pc>=6&&p.gc>=12&&d>=1&&qd>=1)return COLORS.FTL;
  if(p.pc>=6&&d>=2)return COLORS.SQD;
  if(p.pc>=6&&d>=1)return COLORS.QDS;
  if(s.includes('QD')||p.pc>=3)return COLORS.QD;
  return COLORS.D;
}

function grw(p){
  if(!compareData)return null;
  const prev=compareData.partners.find(x=>x.name===p.name);
  if(!prev)return{isNew:true,isHot:false,isCold:false,newlyClosed:false,pd:0,gd:0};
  const pd=p.pc-prev.pc,gd=p.gc-prev.gc;
  return{isNew:false,isHot:pd>=2||gd>=15,isCold:pd<=-2||gd<=-10,newlyClosed:!prev.closed&&p.closed,pd,gd};
}

function buildChanges(){
  const list=document.getElementById('changesList');
  if(!compareData){list.innerHTML='<div style="color:var(--dim)">Select a comparison date above.</div>';return;}
  const newP=[],promoted=[],hot=[],cold=[],closed=[];
  currentData.partners.forEach(p=>{
    const g=grw(p);if(!g)return;
    if(g.isNew)return newP.push(p);
    if(g.newlyClosed)return closed.push(p);
    const prev=compareData.partners.find(x=>x.name===p.name);
    if(prev&&prev.title!==p.title)promoted.push({p,from:prev.title,to:p.title});
    if(g.isHot)hot.push({p,g});
    if(g.isCold)cold.push({p,g});
  });
  let html='';
  const sec=(em,lbl,col,items,fn)=>{
    if(!items.length)return;
    html+=`<div style="font-weight:700;color:${col};margin:.6rem 0 .3rem;font-size:.75rem">${em} ${lbl} (${items.length})</div>`;
    html+=items.map(fn).join('');
  };
  sec('🔥','New','#22c55e',newP,p=>`<div class="change-item" onclick="navTo('${p.name}')">${sname(p)} <span style="color:var(--dim)">${p.title}</span></div>`);
  sec('⭐','Promoted','#fbbf24',promoted,({p,from,to})=>`<div class="change-item" onclick="navTo('${p.name}')">${sname(p)} <span style="color:var(--dim)">${from}→${to}</span></div>`);
  sec('📈','Growing','#22c55e',hot,({p,g})=>`<div class="change-item" onclick="navTo('${p.name}')">${sname(p)} <span style="color:#22c55e">${g.pd>0?'+'+g.pd+'PC ':''} ${g.gd>0?'+'+g.gd+'GC ':''}</span></div>`);
  sec('📉','Declining','#ef4444',cold,({p,g})=>`<div class="change-item" onclick="navTo('${p.name}')">${sname(p)} <span style="color:#ef4444">${g.pd<0?g.pd+'PC ':''} ${g.gd<0?g.gd+'GC ':''}</span></div>`);
  sec('🚨','Newly Closed','#ef4444',closed,p=>`<div class="change-item" onclick="navTo('${p.name}')">${sname(p)}</div>`);
  if(!html)html='<div style="color:var(--dim)">No changes detected.</div>';
  list.innerHTML=html;
}

function buildStatus(){
  const panel=document.getElementById('statusPanel');
  if(!currentData){panel.innerHTML='';return;}
  const you=currentData.partners[0];
  if(!isOOS(you)){panel.innerHTML=`<div style="color:var(--green);font-size:.8rem;padding:.5rem 0">✅ In status as ${you.title}. No action needed.</div>`;return;}
  const title=titleOnly(you).toUpperCase();
  const status=statusOnly(you).toUpperCase();
  const reqs=statusReqs(status);
  const curr=currMetrics(you);
  let html=`<div style="font-size:.8rem;font-weight:700;margin-bottom:.75rem;color:var(--red)">⚠️ Title: <strong>${title}</strong> — Status: <strong>${status}</strong><div style="font-size:.7rem;font-weight:400;color:var(--dim);margin-top:.3rem">Qualifying for ${status} will restore your ${title} bonuses.</div></div>`;
  html+=`<div style="font-size:.75rem;font-weight:700;margin-bottom:.4rem">${status} requirements:</div><div style="background:var(--bg);border-radius:6px;padding:.6rem;margin-bottom:.75rem;font-size:.75rem;">`;
  reqs.forEach(r=>{const met=curr[r.key]>=r.value;html+=`<div style="display:flex;justify-content:space-between;padding:.25rem 0;border-bottom:1px solid var(--border)"><span style="color:var(--dim)">${r.label}</span><span style="color:${met?'#22c55e':'#ef4444'}">${curr[r.key]}/${r.value} ${met?'✓':''}</span></div>`;});
  html+='</div>';
  const opts=buildRoutes(you,status,reqs,curr);
  if(opts.length){html+=`<div style="font-size:.75rem;font-weight:700;margin-bottom:.5rem">🗺️ Routes back to status:</div>`;opts.forEach(o=>{html+=`<div class="option-card ${o.diff}"><div class="option-title">${o.title}</div>${o.rows.map(r=>`<div class="option-row"><span>${r.l}</span><span>${r.v}</span></div>`).join('')}${o.note?`<div style="margin-top:.4rem;color:var(--dim);font-size:.7rem">${o.note}</div>`:''}</div>`;});}
  panel.innerHTML=html;
}

function statusReqs(s){
  const m={GL:[{key:'pc',value:20,label:'PC'},{key:'gc',value:750,label:'GC'},{key:'qd',value:2,label:'QD legs'},{key:'tl',value:3,label:'TL legs'},{key:'stl',value:1,label:'STL leg'}],STL:[{key:'pc',value:10,label:'PC'},{key:'gc',value:56,label:'GC'},{key:'qd',value:2,label:'QD legs'},{key:'tl',value:1,label:'TL leg'}],TL:[{key:'pc',value:10,label:'PC'},{key:'gc',value:56,label:'GC'},{key:'qd',value:2,label:'QD legs'}],QD:[{key:'pc',value:3,label:'PC'}]};
  return m[s]||[];
}

function currMetrics(partner){
  const pi=currentData.partners.indexOf(partner);
  let qd=0,tl=0,stl=0,gl=0;
  for(let i=pi+1;i<currentData.partners.length;i++){
    const p=currentData.partners[i];
    if(p.level<=partner.level)break;
    if(p.level===partner.level+1&&!p.closed){
      const s=statusOnly(p).toUpperCase();
      if(s.includes('GL'))gl++;else if(s.includes('STL'))stl++;else if(s.includes('TL'))tl++;else if(p.pc>=3)qd++;
    }
  }
  return{pc:partner.pc,gc:partner.gc,qd,tl,stl,gl};
}

function buildRoutes(you,status,reqs,curr){
  const opts=[];
  const gaps=reqs.filter(r=>curr[r.key]<r.value);
  if(gaps.length<=2)opts.push({title:`Option A — Direct (${gaps.length} gap${gaps.length===1?'':'s'})`,diff:'viable',rows:gaps.map(g=>({l:g.label,v:`Have ${curr[g.key]}, need ${g.value} (+${g.value-curr[g.key]})`})),note:'Fastest route back to status.'});
  const neededTL=(reqs.find(r=>r.key==='tl')?.value||0)-curr.tl;
  if(neededTL>0){
    const near=currentData.partners.filter(p=>!p.closed&&p.level>1).filter(p=>{const s=statusOnly(p).toUpperCase();return s.includes('QD')&&p.pc>=7&&p.gc>=40;}).slice(0,3);
    if(near.length)opts.push({title:`Option B — Coach ${neededTL} near-TL partner${neededTL>1?'s':''}`,diff:'possible',rows:near.map(p=>({l:sname(p),v:`${p.title} — ${p.pc}PC/${p.gc}GC — needs +${Math.max(0,10-p.pc)}PC +${Math.max(0,56-p.gc)}GC`})),note:'Click names in Changes tab to navigate.'});
  }
  const neededQD=(reqs.find(r=>r.key==='qd')?.value||0)-curr.qd;
  if(neededQD>0){
    const near=currentData.partners.filter(p=>!p.closed&&p.level>1&&p.pc>=1&&p.pc<3).slice(0,5);
    if(near.length)opts.push({title:`Option C — Build ${neededQD} QD leg${neededQD>1?'s':''}`,diff:'possible',rows:near.map(p=>({l:sname(p),v:`${p.pc}PC — needs ${3-p.pc} more`})),note:'These partners are near QD status.'});
  }
  return opts;
}

function searchPartners(q){
  const res=document.getElementById('searchResults');
  if(!currentData||!q.trim()){res.innerHTML='';return;}
  const m=currentData.partners.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())).slice(0,12);
  res.innerHTML=m.length?m.map(p=>`<div class="search-result" onclick="navTo('${p.name}')">${sname(p)} <span style="color:var(--dim);font-size:.7rem">${p.title} · ${p.pc}PC · ${p.gc}GC</span></div>`).join(''):'<div style="color:var(--dim);font-size:.75rem">No matches</div>';
}

function navTo(name){if(!currentData)return;const p=currentData.partners.find(x=>x.name===name);if(p){viewStack=[p];render();}}
function goBack(){if(viewStack.length>1){viewStack.pop();render();}}
function goHome(){if(currentData){viewStack=[currentData.partners[0]];render();}}

function mdown(e){
  const {x,y}=wp(e);
  isDrag=true;dx=e.clientX-ox;dy=e.clientY-oy;
}
function mdbl(e){
  const {x,y}=wp(e);
  const hit=nodes.find(n=>Math.hypot(x-n.x,y-n.y)<=n.r);
  if(hit)navTo(hit.name);
}
function mmove(e){
  if(isDrag){ox=e.clientX-dx;oy=e.clientY-dy;draw();return;}
  const {x,y}=wp(e);
  const hit=nodes.find(n=>Math.hypot(x-n.x,y-n.y)<=n.r);
  if(hit!==hoveredNode){hoveredNode=hit;draw();showTT(e,hit);}
}
function mwheel(e){e.preventDefault();doZoom(e.deltaY>0?.9:1.1);}
function wp(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left-ox)/scale,y:(e.clientY-r.top-oy)/scale};}
function doZoom(f){scale=Math.max(.2,Math.min(5,scale*f));draw();}
function resetView(){scale=1;ox=0;oy=0;draw();}

function showTT(e,n){
  const tt=document.getElementById('tooltip');
  if(!n){tt.className='tooltip';return;}
  const ids=cads(n);
  const g=grw(n);
  let gh='';
  if(g){if(g.isNew)gh='<div style="color:#22c55e;font-size:.7rem;margin-bottom:.4rem">🔥 NEW PARTNER</div>';else if(g.isHot)gh=`<div style="color:#22c55e;font-size:.7rem;margin-bottom:.4rem">🔥 ${g.pd>0?'+'+g.pd+'PC ':''} ${g.gd>0?'+'+g.gd+'GC ':''}</div>`;else if(g.isCold)gh=`<div style="color:#3b82f6;font-size:.7rem;margin-bottom:.4rem">❄️ ${g.pd<0?g.pd+'PC ':''} ${g.gd<0?g.gd+'GC ':''}</div>`;}
  const oos=isOOS(n)?`<div style="color:#fbbf24;font-size:.7rem;margin-bottom:.4rem">⚠️ OOS: ${titleOnly(n)}→${statusOnly(n)}</div>`:""
  tt.innerHTML=`<div class="tt-name">${dname(n)}</div><div class="tt-level">Level ${n.level}</div>${gh}${oos}<div class="tt-badge" style="background:${ncol(n)}">${n.title}</div><div class="tt-pigs"><div class="tt-pig"><div class="tt-pig-val">${n.pc}</div><div class="tt-pig-lbl">PC</div></div><div class="tt-pig"><div class="tt-pig-val">${ids}</div><div class="tt-pig-lbl">IDs</div></div><div class="tt-pig"><div class="tt-pig-val">${n.gc}</div><div class="tt-pig-lbl">GC</div></div><div class="tt-pig"><div class="tt-pig-val">${n.services}</div><div class="tt-pig-lbl">Svcs</div></div></div>`;
  const r=canvas.getBoundingClientRect();
  const tx=Math.min(e.clientX-r.left+16,canvas.width-270);
  const ty=Math.min(e.clientY-r.top+16,canvas.height-180);
  tt.style.left=tx+'px';tt.style.top=ty+'px';tt.className='tooltip show';
}
function hideTT(){document.getElementById('tooltip').className='tooltip';}

function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const ic=document.getElementById('sbToggle');
  sb.classList.toggle('hidden');
  ic.textContent=sb.classList.contains('hidden')?'▶':'◀';
}

function isOOS(p){return p.title.includes('/');}
function titleOnly(p){return p.title.split('/')[0].trim();}
function statusOnly(p){const pts=p.title.split('/');return pts.length>1?pts[1].trim():pts[0].trim();}
function dname(p){const pts=p.name.split(' ');return pts.length>=2?`${pts[0]} ${pts[pts.length-1]}`:pts[0];}
function sname(p){return p.name.split(' ')[0];}
</script>
